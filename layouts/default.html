<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Check and apply theme immediately
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        // If no saved theme, don't set any attribute (defaults to dark mode)
    </script>
    {% include 'head.html' %}
</head>
<body>
    <header class="page-header">
		<a href="/" style="font-weight: 700" id="home-link" {% if clean_url == '/' %}class="fade-on-scroll"{% endif %}>home</a>
        <nav>
            <a href="/projects">projects</a>
            <a href="/scioly">scioly</a>
            <a href="/photography">photography</a>
            <a href="/assets/Rohan_Kelkar_Resume.pdf" target="_blank">resume</a>
            <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">
                <i class="fa-solid fa-circle-half-stroke" alt="Toggle theme"></i>
            </button>
            <!-- Hamburger Icon for mobile -->
            <button class="hamburger" onclick="toggleMenu()">
                &#9776; <!-- This is a simple hamburger icon -->
            </button>
        </nav>
        <progress value="0" max="100"></progress>
    </header>

    <!-- Side Menu for mobile-->
    <nav class="side-menu" id="sideMenu">
        <a href="/projects">projects</a>
        <a href="/scioly">scioly</a>
        <a href="/photography">photography</a>
        <a href="/assets/Rohan_Kelkar_Resume.pdf" target="_blank">resume</a>
    </nav>

    <main>
    {% if clean_url == '/' %}
    <img src="{{site.headshot}}" alt="Headshot" class="headshot">
    {% endif %}
    {{content}}
    </main>
    <footer class="page-footer">
        <small> Built by Rohan Kelkar using
            <a href="https://www.11ty.dev/" target="_blank">11ty</a> 
            <a href="https://github.com/binyamin/eleventy-garden" target="_blank">garden</a>.
            Last updated July 2026.
        </small>
    </footer>
    <script src="/assets/js/progress.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/hamburger.js"></script>
</body>
</html>
